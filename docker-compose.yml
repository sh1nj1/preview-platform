# Preview Platform — Traefik v3 + Let's Encrypt wildcard
# Edit .env first, then: docker compose up -d

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.9
    container_name: preview-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      INFO: 1
      EVENTS: 1
      PING: 1
    networks:
      - socket-proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:2375/_ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  version-proxy:
    image: nginx:1.27-alpine
    container_name: preview-version-proxy
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_healthy
    volumes:
      - ./nginx-version-rewrite.conf:/etc/nginx/nginx.conf:ro
    networks:
      - socket-proxy

  traefik:
    image: traefik:v3.2
    container_name: preview-traefik
    restart: unless-stopped
    depends_on:
      version-proxy:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - AWS_HOSTED_ZONE_ID=${AWS_HOSTED_ZONE_ID}
    volumes:
      - ./letsencrypt:/letsencrypt
      - ./dynamic:/dynamic:ro
    networks:
      - preview
      - socket-proxy
    command:
      # --- Providers ---
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=preview
      - --providers.docker.endpoint=tcp://version-proxy:2376
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true

      # --- Entry points + global HTTP→HTTPS redirect ---
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443

      # --- Wildcard cert via Route53 DNS-01 ---
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=route53
      # Pre-fetch wildcard so all *.<domain> reuse the same cert
      - --entrypoints.websecure.http.tls.certresolver=le
      - --entrypoints.websecure.http.tls.domains[0].main=${PREVIEW_DOMAIN}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${PREVIEW_DOMAIN}

      # --- Dashboard + API ---
      - --api.dashboard=true
      - --api.insecure=false

      # --- Logs ---
      - --log.level=INFO
      - --accesslog=true

    labels:
      - traefik.enable=true
      # Router 1: serve dashboard + API paths (api@internal requires explicit PathPrefix in v3)
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${PREVIEW_DOMAIN}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.middlewares=dashboard-auth
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${DASHBOARD_AUTH}"
      # Router 2: redirect root → /dashboard/
      - "traefik.http.routers.dashboard-root.rule=Host(`traefik.${PREVIEW_DOMAIN}`) && Path(`/`)"
      - traefik.http.routers.dashboard-root.service=api@internal
      - traefik.http.routers.dashboard-root.tls=true
      - traefik.http.routers.dashboard-root.entrypoints=websecure
      - traefik.http.routers.dashboard-root.middlewares=dashboard-root-redirect
      - "traefik.http.middlewares.dashboard-root-redirect.redirectregex.regex=^https?://[^/]+/?$$"
      - "traefik.http.middlewares.dashboard-root-redirect.redirectregex.replacement=https://traefik.${PREVIEW_DOMAIN}/dashboard/"
      - traefik.http.middlewares.dashboard-root-redirect.redirectregex.permanent=false

  preview-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: preview-api:local
    container_name: preview-api
    restart: unless-stopped
    environment:
      - LISTEN_ADDR=:8080
      - PREVIEW_API_TOKEN=${PREVIEW_API_TOKEN}
      - PREVIEW_DOMAIN=${PREVIEW_DOMAIN}
      - PREVIEW_PUBLIC_API_URL=https://api.${PREVIEW_DOMAIN}
      - DYNAMIC_DIR=/dynamic
    volumes:
      - ./dynamic:/dynamic
    networks:
      - preview
    labels:
      - traefik.enable=true
      - traefik.docker.network=preview
      - traefik.http.routers.preview-api.rule=Host(`api.${PREVIEW_DOMAIN}`)
      - traefik.http.routers.preview-api.entrypoints=websecure
      - traefik.http.routers.preview-api.tls=true
      - traefik.http.services.preview-api.loadbalancer.server.port=8080

networks:
  preview:
    name: preview
  socket-proxy:
    internal: true
