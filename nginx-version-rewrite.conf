worker_processes 1;
events {}
http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 2376;
        location / {
            # Rewrite any /v1.X/ to /v1.47/ — Traefik v3.2 SDK sends /v1.24/
            # but Docker Engine 29+ requires API >= 1.44
            rewrite ^/v1\.[0-9]+(/.*)?$ /v1.47$1 break;
            proxy_pass         http://socket-proxy:2375;
            proxy_http_version 1.1;
            proxy_set_header   Host $http_host;
            proxy_set_header   Connection "";
            # Long timeout for Docker event streams
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
